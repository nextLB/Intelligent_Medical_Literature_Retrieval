<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 医学文献智能检索系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 400px;
        }
        .login-title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #5568d3;
        }
        .error-message {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
        }
        .back-home {
            text-align: center;
            margin-top: 15px;
        }
        .back-home a {
            color: #999;
            text-decoration: none;
            font-size: 14px;
        }
        .role-select {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .role-option:hover {
            border-color: #667eea;
        }
        .role-option input {
            display: none;
        }
        .role-option.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }
        .role-option .role-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .role-option .role-name {
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">医学文献智能检索系统</h2>
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>选择身份</label>
                    <div class="role-select">
                        <label class="role-option selected" id="role-user-option">
                            <input type="radio" name="role" value="user" checked>
                            <div class="role-icon">&#128100;</div>
                            <div class="role-name">普通用户</div>
                        </label>
                        <label class="role-option" id="role-admin-option">
                            <input type="radio" name="role" value="admin">
                            <div class="role-icon">&#128295;</div>
                            <div class="role-name">管理员</div>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-login">登录</button>
            </form>
            <script>
                document.querySelectorAll('.role-option').forEach(function(option) {
                    option.addEventListener('click', function() {
                        document.querySelectorAll('.role-option').forEach(function(o) {
                            o.classList.remove('selected');
                        });
                        this.classList.add('selected');
                        this.querySelector('input').checked = true;
                    });
                });
            </script>
            <p class="register-link">
                还没有账号？ <a href="/register/">立即注册</a>
            </p>
            <p class="back-home">
                <a href="/">返回首页</a>
            </p>
        </div>
    </div>
</body>
</html>
